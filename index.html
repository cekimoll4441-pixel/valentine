<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürpriz Təklif</title>
    <style>
        /* CSS Hissəsi - Görünüş */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff; /* Ağ fon */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Düymənin ekrandan kənara çıxmaması üçün */
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #b32d2d; /* Şəkildəki tünd qırmızı rəng */
            font-size: 2.5rem;
            margin-bottom: 40px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 10px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        /* Yaşıl Bəli düyməsi */
        #yesBtn {
            background-color: #4CAF50;
            color: white;
        }

        /* Qırmızı Xeyr düyməsi */
        #noBtn {
            background-color: #f44336;
            color: white;
            position: absolute; /* Qaçması üçün vacibdir */
        }

        #yesBtn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mənim Sevgilim Olarsan?</h1>
        <div class="buttons">
            <button id="yesBtn">Bəli</button>
            <button id="noBtn">Xeyr</button>
        </div>
    </div>

    <script>
        /* JavaScript Hissəsi - Hərəkət */
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');

        // "Xeyr" düyməsinin üzərinə gələndə qaçması
        noBtn.addEventListener('mouseover', () => {
            // Ekranın ölçülərinə görə təsadüfi yer seçirik
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        });

        // "Bəli" düyməsinə basıldıqda mesaj çıxması
        yesBtn.addEventListener('click', () => {
            alert('Təbriklər! Artıq sevgilisiniz! ❤️');
            // İstəsən bura bir konfeti effekti və ya musiqi də əlavə edə bilərik
        });
    </script>

</body>
</html>
