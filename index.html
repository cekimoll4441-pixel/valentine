<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Müəllimə Özəl Hədiyyə</title>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --bg-gradient: linear-gradient(135deg, #fff5f6 0%, #feb1b7 100%);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-gradient);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }

        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
            width: 90%;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 2px solid white;
            animation: fadeIn 2s ease-out;
        }

        h1 {
            color: #c9184a;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        p {
            color: #590d22;
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .hint {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #ff4d6d;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="card">
            <h1>Nə Yaxşı Ki Varsınız, Müəllimə!</h1>
            <p>Sizin işığınız yolumuzu hər zaman aydınladır.<br> 
            Hər bir çiçək minnətdarlığımızın kiçik bir simvoludur.</p>
        </div>
    </div>

    <div class="hint">Ekrana toxunun və güllərin açılışını izləyin...</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let flowers = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Flower {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = 0;
                this.maxSize = Math.random() * 40 + 20;
                this.speed = Math.random() * 2 + 1;
                this.petals = Math.floor(Math.random() * 3) + 5;
                this.color = `hsl(${Math.random() * 40 + 340}, 80%, 60%)`;
                this.rotation = Math.random() * Math.PI * 2;
                this.finished = false;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                for (let i = 0; i < this.petals; i++) {
                    ctx.beginPath();
                    ctx.fillStyle = this.color;
                    ctx.rotate((Math.PI * 2) / this.petals);
                    ctx.ellipse(0, this.size / 2, this.size / 4, this.size / 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.closePath();
                }

                // Gülün mərkəzi
                ctx.beginPath();
                ctx.fillStyle = '#ffb703';
                ctx.arc(0, 0, this.size / 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.closePath();
                
                ctx.restore();
            }

            update() {
                if (this.size < this.maxSize) {
                    this.size += this.speed;
                } else {
                    this.finished = true;
                }
            }
        }

        function createFlower(e) {
            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;
            for(let i = 0; i < 5; i++) {
                setTimeout(() => {
                    flowers.push(new Flower(
                        x + (Math.random() - 0.5) * 100, 
                        y + (Math.random() - 0.5) * 100
                    ));
                }, i * 100);
            }
        }

        window.addEventListener('mousedown', createFlower);
        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            createFlower(e);
        }, {passive: false});

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            flowers.forEach((flower, index) => {
                flower.draw();
                flower.update();
            });
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
