<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeynəb üçün sürpriz ❤️</title>
    <style>
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: #fce4ec; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; overflow: hidden; }
        .container { text-align: center; padding: 20px; }
        h1 { color: #d32f2f; margin-bottom: 20px; font-size: 2.2rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        #cat-container { width: 280px; height: 280px; margin-bottom: 20px; display: inline-block; }
        #cat-container img { width: 100%; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .buttons { display: flex; justify-content: center; align-items: center; gap: 20px; height: 100px; }
        .yes-button { font-size: 1.5rem; padding: 12px 35px; background-color: #4caf50; color: white; border: none; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .no-button { font-size: 1.5rem; padding: 12px 35px; background-color: #f44336; color: white; border: none; border-radius: 12px; cursor: pointer; position: relative; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="title">Zeynəb, mənimlə sevgili olarsan? ❤️</h1>
        
        <div id="cat-container">
            <img id="main-cat" src="https://media.tenor.com/w9N9qfM_P4AAAAAi/cute-cat.gif">
        </div>

        <div class="buttons">
            <button class="yes-button" onclick="happy()">Bəli</button>
            <button id="no-btn" class="no-button" onmouseover="escape()">Xeyr</button>
        </div>
    </div>

    <script>
        function escape() {
            const btn = document.getElementById('no-btn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            
            btn.style.position = 'absolute';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.innerText = "Dəqiq??"; 
        }

        function happy() {
            const cat = document.getElementById('main-cat');
            const title = document.getElementById('title');
            const buttons = document.querySelector('.buttons');

            // Bəli deyəndə çıxan pişik və yeni yazı
            cat.src = "https://media.tenor.com/9lS4K7wL8iUAAAAAi/cute-cat-love.gif";
            title.innerText = "Uraaa! ❤️ Dünyanın ən xoşbəxt adamı oldum, Zeynəb!";
            buttons.style.display = 'none';
        }
    </script>

</body>
</html>
