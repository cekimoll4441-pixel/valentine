<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürət Testi Oyunu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            width: 100vw;
            height: 80vh;
            position: relative;
        }
        #target {
            width: 50px;
            height: 50px;
            background-color: #ff4757;
            border-radius: 50%;
            position: absolute;
            display: none;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        #stats {
            padding: 20px;
            background: #2f3542;
            color: white;
            font-size: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #2ed573;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="stats">
        Xal: <span id="score">0</span> | Rekord: <span id="high-score">0</span>
        <br>
        <button onclick="startGame()" id="start-btn">Oyuna Başla</button>
    </div>

    <div id="game-container">
        <div id="target" onclick="hitTarget()"></div>
    </div>

    <script>
        let score = 0;
        let highScore = 0;
        let startTime;
        const target = document.getElementById('target');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('high-score');
        const startBtn = document.getElementById('start-btn');

        function startGame() {
            score = 0;
            scoreDisplay.innerText = score;
            startBtn.style.display = 'none';
            moveTarget();
        }

        function moveTarget() {
            const container = document.getElementById('game-container');
            const maxX = container.clientWidth - 50;
            const maxY = container.clientHeight - 50;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            target.style.left = randomX + 'px';
            target.style.top = randomY + 'px';
            target.style.display = 'block';
            
            startTime = new Date().getTime();
        }

        function hitTarget() {
            score++;
            scoreDisplay.innerText = score;
            
            if (score > highScore) {
                highScore = score;
                highScoreDisplay.innerText = highScore;
            }

            target.style.display = 'none';
            
            // Hər klikdən sonra növbəti hədəf bir az daha tez və ya gec gəlsin (təsadüfi)
            setTimeout(moveTarget, Math.random() * 500 + 200);
        }
    </script>
</body>
</html>
